# Nginx reverse-proxy for Ka Education
# Place in /etc/nginx/sites-available/ka-education and symlink to sites-enabled/

server {
    listen 80;
    server_name maatecosystem.com www.maatecosystem.com;

    # Redirect to HTTPS (uncomment once cert is issued)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

